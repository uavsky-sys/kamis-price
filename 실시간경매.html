<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>농수산물 실시간 경매가격</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --green:#1b6b2f; --green2:#2d8a4a; --green-lt:#e8f5ee;
  --border:#ddd; --text:#222; --sub:#666;
  --red:#c62828; --blue:#1565c0;
}
html, body { height:100%; }
body {
  font-family:'Malgun Gothic','맑은 고딕',sans-serif;
  background:#f5f5f5; color:var(--text);
  max-width:600px; margin:0 auto;
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}

/* 헤더 */
header {
  background:var(--green); color:#fff;
  padding:10px 14px; display:flex;
  align-items:center; justify-content:space-between; flex-shrink:0;
}
header h1 { font-size:15px; font-weight:700; }
.refresh-btn { background:rgba(255,255,255,0.2); border:none; color:#fff; padding:5px 10px; border-radius:4px; font-size:12px; cursor:pointer; }

/* API 배너 */
.api-banner { background:#fff8e1; border-bottom:2px solid #ffc107; padding:10px 14px; font-size:12px; flex-shrink:0; display:none; }
.api-banner .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:6px; }
.api-banner input { flex:1; min-width:160px; padding:6px 10px; border:1px solid #ffc107; border-radius:4px; font-size:12px; font-family:monospace; }
.api-banner input.id-input { max-width:70px; flex:none; }
.api-banner button { padding:6px 12px; background:var(--green); color:#fff; border:none; border-radius:4px; font-size:12px; cursor:pointer; }

/* ===== 상단 필터 패널 (가로 한 줄) ===== */
.filter-panel {
  background:var(--green); flex-shrink:0;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filter-panel::-webkit-scrollbar { display:none; }
.filter-row { display:flex; min-width:max-content; width:100%; }
.filter-btn {
  flex:1; min-width:72px;
  background:none; border:none;
  border-right:1px solid rgba(255,255,255,0.18);
  color:#fff; padding:8px 6px;
  cursor:pointer; text-align:center; font-family:inherit;
  transition:opacity 0.15s, background 0.1s;
}
.filter-btn:not(.fb-dim):active { background:rgba(0,0,0,0.15); }
.filter-btn.fb-dim { opacity:0.3; cursor:default; }
.filter-btn.fb-active { background:rgba(255,255,255,0.12); }
.fb-label { font-size:9px; color:rgba(255,255,255,0.7); display:block; margin-bottom:2px; letter-spacing:0.3px; }
.fb-value { font-size:12px; font-weight:700; color:#fff; display:block; line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80px; margin:0 auto; }
.fb-count { font-size:9px; color:rgba(255,255,255,0.7); display:block; }
.search-btn {
  flex-shrink:0; width:48px;
  background:rgba(0,0,0,0.25); border:none;
  border-left:1px solid rgba(255,255,255,0.25);
  color:#fff; font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit;
}
.search-btn:active { background:rgba(0,0,0,0.4); }

/* 정렬 바 */
.sort-bar {
  background:#fff; border-bottom:1px solid var(--border);
  padding:4px 12px; display:flex; justify-content:flex-end;
  align-items:center; gap:8px; flex-shrink:0;
}
.sort-bar button {
  background:none; border:1px solid var(--border); border-radius:12px;
  padding:3px 10px; font-size:11px; color:var(--sub);
  cursor:pointer; font-family:inherit;
}
.sort-bar button.active { background:var(--green); color:#fff; border-color:var(--green); }

/* ===== 즐겨찾기 바 ===== */
.favorites-bar { display:flex; background:#fff; border-bottom:1px solid var(--border); flex-shrink:0; }
.fav-slot {
  flex:1; position:relative; border-right:1px solid var(--border);
  padding:6px 20px 6px 8px; cursor:pointer;
  background:none; border-top:none; border-bottom:none; font-family:inherit;
  text-align:left; min-width:0;
}
.fav-slot:last-child { border-right:none; }
.fav-slot:active { background:#f5f5f5; }
.fav-empty { color:#bbb; font-size:12px; display:flex; align-items:center; justify-content:center; gap:4px; padding:10px 4px; }
.fav-star { font-size:13px; color:var(--green); display:block; margin-bottom:1px; }
.fav-name { font-size:11px; font-weight:700; color:var(--text); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fav-sub  { font-size:10px; color:var(--sub); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fav-del {
  position:absolute; top:4px; right:4px;
  font-size:11px; color:#bbb; cursor:pointer;
  background:none; border:none; padding:2px; line-height:1;
}
.fav-del:active { color:var(--red); }
.fav-saved { background:var(--green-lt); }

/* 테이블 영역 */
.table-wrap { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.status-bar {
  background:#fff; padding:5px 12px;
  display:flex; justify-content:space-between; align-items:center;
  font-size:11px; color:var(--sub);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:10;
}
.status-bar strong { color:var(--text); }

table { width:100%; border-collapse:collapse; background:#fff; font-size:12px; }
thead th {
  position:sticky; top:27px; background:#fff; z-index:9;
  border-bottom:2px solid var(--border);
  padding:7px 4px; text-align:center; font-weight:700;
  white-space:nowrap; color:var(--sub);
}
thead th:last-child { color:var(--red); }
tbody tr { border-bottom:1px solid #f0f0f0; }
tbody tr:active { background:#f9f9f9; }
tbody td { padding:7px 4px; text-align:center; vertical-align:middle; line-height:1.4; }
.td-item { font-weight:700; color:var(--text); font-size:13px; }
.td-kind { font-size:11px; color:var(--sub); }
.td-price { font-weight:700; color:var(--red); white-space:nowrap; font-size:13px; }
.td-date  { color:var(--sub); font-size:10px; white-space:nowrap; }

.empty-row td { padding:60px 20px; color:var(--sub); text-align:center; font-size:13px; }
.spinner { width:28px; height:28px; border:3px solid #e0e0e0; border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }

.no-data-box { margin:20px 12px; background:#fff8e1; border:1px solid #ffc107; border-radius:8px; padding:20px; text-align:center; }
.no-data-box .icon { font-size:36px; margin-bottom:8px; }
.no-data-box p { font-size:13px; color:#555; line-height:1.6; margin-bottom:12px; }
.no-data-box a { display:inline-block; margin:4px; padding:6px 12px; background:#e8f5ee; color:var(--green); border-radius:6px; font-size:12px; font-weight:600; text-decoration:none; border:1px solid #b8dfc9; }

/* ===== 보텀 시트 ===== */
.sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; }
.sheet-overlay.open { display:block; }
.sheet {
  position:absolute; bottom:0;
  left:50%; transform:translateX(-50%);
  width:100%; max-width:600px;
  background:#fff; border-radius:16px 16px 0 0;
  max-height:70vh; overflow-y:auto;
}
.sheet-header {
  padding:14px 16px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0; background:#fff;
}
.sheet-title { font-size:15px; font-weight:700; }
.sheet-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--sub); }
.sheet-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 16px; cursor:pointer;
  border-bottom:1px solid #f5f5f5; font-size:14px;
}
.sheet-item:active { background:#f5f5f5; }
.sheet-item.active { color:var(--green); font-weight:700; }
.sheet-item .cnt { font-size:12px; color:var(--sub); }
.sheet-item.active .cnt { color:var(--green); }

#date-input-hidden { position:absolute; opacity:0; pointer-events:none; width:0; height:0; }
</style>
</head>
<body>

<header>
  <h1>🌾 농수산물 실시간 경매가격</h1>
  <button class="refresh-btn" onclick="doSearch()">🔄 새로고침</button>
</header>

<div class="api-banner" id="api-banner">
  <div style="font-weight:700;color:#856404;margin-bottom:6px">🔑 KAMIS API 인증키 설정</div>
  <div class="row">
    <input type="text" id="api-key-input" placeholder="API 인증키 입력..." />
    <input type="text" id="api-id-input" class="id-input" placeholder="ID" />
    <button onclick="saveApiKey()">저장</button>
  </div>
  <a href="https://www.data.go.kr/tcs/dss/selectApiDataDetailView.do?publicDataPk=15100070" target="_blank" style="color:#1565c0;font-size:11px">🔗 data.go.kr에서 무료 발급</a>
</div>

<div class="api-banner" id="mafra-banner" style="border-color:#4caf50;background:#f1f8e9">
  <div style="font-weight:700;color:#2e7d32;margin-bottom:6px">🔑 농림부 도매시장 API 키 설정</div>
  <div class="row">
    <input type="text" id="mafra-key-input" placeholder="data.mafra.go.kr API 키..." />
    <button onclick="saveMrafaKey()" style="background:#2e7d32">저장</button>
  </div>
  <div style="color:#555;font-size:11px">로컬 서버(localhost)에서만 동작합니다.</div>
</div>

<!-- 상단 필터 패널: 일자 | 도매시장 | 도매법인 | 분류 | 품목 | 품종 | 검색 -->
<div class="filter-panel">
  <div class="filter-row">
    <button class="filter-btn" id="fb-btn-date" onclick="openSheet('date')">
      <span class="fb-label">일자</span>
      <span class="fb-value" id="fb-date">-</span>
    </button>
    <button class="filter-btn" id="fb-btn-market" onclick="openSheet('market')">
      <span class="fb-label">도매시장</span>
      <span class="fb-value" id="fb-market">서울 가락</span>
    </button>
    <button class="filter-btn" id="fb-btn-corp" onclick="openSheet('corp')">
      <span class="fb-label">도매법인</span>
      <span class="fb-value" id="fb-corp">전체</span>
      <span class="fb-count" id="fb-corp-cnt"></span>
    </button>
    <button class="filter-btn" id="fb-btn-cat" onclick="openSheet('cat')">
      <span class="fb-label">분류</span>
      <span class="fb-value" id="fb-cat">과일류</span>
      <span class="fb-count" id="fb-cat-cnt"></span>
    </button>
    <button class="filter-btn" id="fb-btn-item" onclick="openSheet('item')">
      <span class="fb-label">품목</span>
      <span class="fb-value" id="fb-item">전체</span>
      <span class="fb-count" id="fb-item-cnt"></span>
    </button>
    <button class="filter-btn" id="fb-btn-kind" onclick="openSheet('kind')">
      <span class="fb-label">품종</span>
      <span class="fb-value" id="fb-kind">전체</span>
      <span class="fb-count" id="fb-kind-cnt"></span>
    </button>
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>
</div>

<!-- 정렬 바 -->
<div class="sort-bar" id="sort-bar">
  <span style="font-size:11px;color:var(--sub)">정렬</span>
  <button id="sort-pd" onclick="setSort('price-desc')" class="active">가격↓</button>
  <button id="sort-pa" onclick="setSort('price-asc')">가격↑</button>
  <button id="sort-it" onclick="setSort('item')">품목순</button>
</div>

<!-- 즐겨찾기 바 -->
<div class="favorites-bar" id="favorites-bar"></div>

<!-- 테이블 -->
<div class="table-wrap">
  <div class="status-bar">
    <span id="result-info">조건을 선택하고 검색하세요</span>
    <span id="last-update"></span>
  </div>
  <table>
    <thead>
      <tr id="thead-row">
        <th>날짜</th><th>품목</th><th>등급</th><th>규격</th><th>경락가</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr class="empty-row"><td colspan="5">조건을 선택하고 검색하세요</td></tr>
    </tbody>
  </table>
  <div id="no-data-area"></div>
</div>

<!-- 보텀 시트 -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <span class="sheet-title" id="sheet-title">선택</span>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div id="sheet-items"></div>
  </div>
</div>

<input type="date" id="date-input-hidden" onchange="selectDate(this.value)" />

<script>
const CATS = [
  {code:'',    name:'전체'},
  {code:'200', name:'채소류'},
  {code:'400', name:'과일류'},
  {code:'300', name:'특용작물'},
  {code:'100', name:'식량작물'},
  {code:'500', name:'축산물'},
  {code:'600', name:'수산물'},
  {code:'700', name:'임산물'},
];
const MARKETS = [
  {code:'110', name:'서울 가락'},
  {code:'111', name:'서울 강서'},
  {code:'120', name:'인천'},
  {code:'130', name:'수원'},
  {code:'210', name:'부산 엄궁'},
  {code:'211', name:'부산 반여'},
  {code:'220', name:'대구'},
  {code:'230', name:'전주'},
  {code:'240', name:'대전'},
  {code:'250', name:'청주'},
  {code:'260', name:'광주'},
  {code:'270', name:'창원'},
];
const ITEMS = {
  '':    [],
  '100': [{c:'111',n:'쌀'},{c:'112',n:'찹쌀'},{c:'121',n:'콩'},{c:'131',n:'팥'},{c:'141',n:'녹두'},{c:'151',n:'옥수수'},{c:'161',n:'고구마'},{c:'162',n:'감자'}],
  '200': [{c:'211',n:'배추'},{c:'212',n:'양배추'},{c:'214',n:'상추'},{c:'215',n:'시금치'},{c:'216',n:'미나리'},{c:'217',n:'깻잎'},{c:'221',n:'무'},{c:'222',n:'당근'},{c:'232',n:'대파'},{c:'233',n:'쪽파'},{c:'241',n:'양파'},{c:'242',n:'마늘'},{c:'251',n:'오이'},{c:'252',n:'호박'},{c:'253',n:'토마토'},{c:'254',n:'방울토마토'},{c:'255',n:'파프리카'},{c:'259',n:'풋고추'},{c:'261',n:'고추(홍)'},{c:'271',n:'버섯(느타리)'},{c:'272',n:'버섯(팽이)'},{c:'273',n:'버섯(새송이)'}],
  '300': [{c:'311',n:'참깨'},{c:'312',n:'들깨'},{c:'321',n:'땅콩'},{c:'331',n:'인삼'},{c:'351',n:'생강'}],
  '400': [{c:'411',n:'사과'},{c:'412',n:'배'},{c:'421',n:'복숭아'},{c:'431',n:'포도'},{c:'441',n:'감귤'},{c:'443',n:'한라봉'},{c:'451',n:'단감'},{c:'461',n:'참외'},{c:'471',n:'수박'},{c:'481',n:'딸기'},{c:'491',n:'바나나'},{c:'493',n:'키위'},{c:'494',n:'블루베리'},{c:'496',n:'체리'}],
  '500': [{c:'511',n:'한우(등심)'},{c:'521',n:'돼지(삼겹살)'},{c:'531',n:'닭고기'},{c:'541',n:'계란'}],
  '600': [{c:'611',n:'갈치'},{c:'614',n:'고등어'},{c:'615',n:'명태'},{c:'616',n:'오징어'},{c:'617',n:'조기'},{c:'625',n:'황태'},{c:'631',n:'굴'},{c:'633',n:'새우'},{c:'641',n:'김'},{c:'642',n:'미역'}],
  '700': [{c:'711',n:'밤'},{c:'712',n:'잣'},{c:'721',n:'표고버섯'},{c:'722',n:'송이버섯'}],
};
const NO_KAMIS = ['블루베리','복분자'];
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
const KAMIS_BASE = 'https://www.kamis.or.kr/service/price/xml.do';

// WHS = 도매시장 모드 (selCat === 'WHS')
let apiKey    = localStorage.getItem('kamis_api_key') || '';
let apiId     = localStorage.getItem('kamis_api_id')  || '8314';
let mrafaKey  = localStorage.getItem('mafra_api_key') || '';
let selDate   = '';
let selCat    = '400';
let selItem   = '';
let selKind   = '';
let selGrade  = '';
let selSort   = 'price-desc';
let selMarket = '110';
let selCorp   = '';
let rawData   = [];
let allData   = [];
let whlData   = [];
let favorites = JSON.parse(localStorage.getItem('kamis_favs') || '[null,null,null]');
if (!Array.isArray(favorites) || favorites.length < 3) favorites = [null,null,null];

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const day = today.getDay();
  if (day === 0) today.setDate(today.getDate() - 2);
  if (day === 6) today.setDate(today.getDate() - 1);
  selDate = today.toISOString().slice(0,10);
  document.getElementById('date-input-hidden').value = selDate;
  updatePanel();
  renderFavorites();
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('api-id-input').value  = apiId;
    doSearch();
  } else {
    document.getElementById('api-banner').style.display = 'block';
  }
  if (mrafaKey) document.getElementById('mafra-key-input').value = mrafaKey;
});

function saveApiKey() {
  const k  = document.getElementById('api-key-input').value.trim();
  const id = document.getElementById('api-id-input').value.trim() || '8314';
  if (!k) { alert('API 키를 입력해주세요.'); return; }
  apiKey = k; apiId = id;
  localStorage.setItem('kamis_api_key', k);
  localStorage.setItem('kamis_api_id',  id);
  document.getElementById('api-banner').style.display = 'none';
  doSearch();
}

function saveMrafaKey() {
  const k = document.getElementById('mafra-key-input').value.trim();
  if (!k) { alert('API 키를 입력해주세요.'); return; }
  mrafaKey = k;
  localStorage.setItem('mafra_api_key', k);
  document.getElementById('mafra-banner').style.display = 'none';
  doSearch();
}

// ===== 정렬 =====
function setSort(v) {
  selSort = v;
  ['pd','pa','it'].forEach(s => document.getElementById('sort-'+s).classList.remove('active'));
  document.getElementById('sort-' + (v==='price-desc'?'pd':v==='price-asc'?'pa':'it')).classList.add('active');
  if (selCat === 'WHS') filterWholesale(); else renderTable(sortData(allData));
}

// ===== 즐겨찾기 =====
function makeFavLabel() {
  if (selCat === 'WHS') {
    const mkt = MARKETS.find(m=>m.code===selMarket)?.name || '도매시장';
    return '도매시장 › ' + mkt + (selCorp ? ' › '+selCorp : '');
  }
  const catName  = CATS.find(c=>c.code===selCat)?.name || '';
  const itemName = getItemName(selItem) || selItem || '';
  const parts = [catName, itemName].filter(Boolean);
  return parts.length ? parts.join(' › ') : '전체';
}

function saveFavorite(slot) {
  favorites[slot] = {
    date:selDate, cat:selCat, item:selItem,
    kind:selKind, grade:selGrade, sort:selSort,
    market:selMarket, corp:selCorp,
    label:makeFavLabel(),
  };
  localStorage.setItem('kamis_favs', JSON.stringify(favorites));
  renderFavorites();
}

function loadFavorite(slot) {
  const fav = favorites[slot];
  if (!fav) return;
  selDate = fav.date; selCat = fav.cat; selItem = fav.item;
  selKind = fav.kind; selGrade = fav.grade; selSort = fav.sort || 'price-desc';
  selMarket = fav.market || '110'; selCorp = fav.corp || '';
  document.getElementById('date-input-hidden').value = selDate;
  setSort(selSort);
  updatePanel();
  doSearch();
}

function deleteFavorite(slot, e) {
  e.stopPropagation();
  favorites[slot] = null;
  localStorage.setItem('kamis_favs', JSON.stringify(favorites));
  renderFavorites();
}

function renderFavorites() {
  const bar = document.getElementById('favorites-bar');
  bar.innerHTML = [0,1,2].map(i => {
    const fav = favorites[i];
    if (fav) {
      return `<button class="fav-slot fav-saved" onclick="loadFavorite(${i})">
        <span class="fav-star">⭐</span>
        <span class="fav-name">${fav.label}</span>
        <span class="fav-sub">${fav.date}</span>
        <button class="fav-del" onclick="deleteFavorite(${i},event)">✕</button>
      </button>`;
    }
    return `<button class="fav-slot" onclick="saveFavorite(${i})">
      <div class="fav-empty">☆ <span style="font-size:11px">저장</span></div>
    </button>`;
  }).join('');
}

// ===== 필터 패널 업데이트 =====
function updatePanel() {
  const isWhs = selCat === 'WHS';
  document.getElementById('fb-date').textContent = selDate.replace(/-/g,'') || '-';

  // 도매시장/도매법인: WHS 모드에서만 활성
  const mktName = MARKETS.find(m=>m.code===selMarket)?.name || '서울 가락';
  document.getElementById('fb-market').textContent = mktName;
  document.getElementById('fb-corp').textContent   = selCorp || '전체';
  const corpCnt = selCorp ? whlData.filter(d=>d.corp===selCorp).length : whlData.length;
  document.getElementById('fb-corp-cnt').textContent = whlData.length ? `(${corpCnt})` : '';
  document.getElementById('fb-btn-market').className = 'filter-btn' + (isWhs ? ' fb-active' : ' fb-dim');
  document.getElementById('fb-btn-corp').className   = 'filter-btn' + (isWhs ? ' fb-active' : ' fb-dim');

  // 분류/품목/품종: KAMIS 모드에서만 활성
  const catName  = CATS.find(c=>c.code===selCat)?.name || '전체';
  const itemName = getItemName(selItem) || (selItem || '전체');
  document.getElementById('fb-cat').textContent  = isWhs ? '—' : catName;
  document.getElementById('fb-cat-cnt').textContent = (!isWhs && rawData.length) ? `(${rawData.length})` : '';
  document.getElementById('fb-item').textContent = isWhs ? '—' : itemName;
  document.getElementById('fb-item-cnt').textContent = (!isWhs && allData.length) ? `(${allData.length})` : '';
  const kindBase = selItem ? allData : rawData;
  document.getElementById('fb-kind').textContent = isWhs ? '—' : (selKind || '전체');
  document.getElementById('fb-kind-cnt').textContent = (!isWhs && kindBase.length) ? `(${kindBase.length})` : '';
  document.getElementById('fb-btn-cat').className  = 'filter-btn' + (isWhs ? ' fb-dim' : '');
  document.getElementById('fb-btn-item').className = 'filter-btn' + (isWhs ? ' fb-dim' : '');
  document.getElementById('fb-btn-kind').className = 'filter-btn' + (isWhs ? ' fb-dim' : '');
}

// ===== 보텀 시트 =====
let curSheet = '';
function openSheet(type) {
  const isWhs = selCat === 'WHS';
  if (type === 'market' || type === 'corp') {
    if (!isWhs && type === 'corp') return; // 비활성
  }
  if ((type === 'cat' || type === 'item' || type === 'kind') && isWhs) return; // 비활성

  curSheet = type;
  if (type === 'date') {
    const inp = document.getElementById('date-input-hidden');
    try { inp.showPicker(); } catch(e) { inp.click(); }
    return;
  }

  let title = '', options = [];
  if (type === 'market') {
    title = '도매시장 선택';
    options = MARKETS.map(m=>({val:m.code, label:m.name, cnt:null, active:selMarket===m.code}));
  } else if (type === 'corp') {
    title = '도매법인 선택';
    const corps = [...new Set(whlData.map(d=>d.corp))].filter(c=>c&&c!=='-').sort();
    options = [{val:'', label:'전체', cnt:whlData.length, active:selCorp===''}];
    corps.forEach(c=>options.push({val:c, label:c, cnt:whlData.filter(d=>d.corp===c).length, active:selCorp===c}));
  } else if (type === 'cat') {
    title = '분류 선택';
    options = CATS.map(c=>({val:c.code, label:c.name, cnt:null, active:selCat===c.code}));
  } else if (type === 'item') {
    title = '품목 선택';
    const catItems = ITEMS[selCat] || [];
    options = [{val:'', label:'전체', cnt:rawData.length, active:selItem===''}];
    catItems.forEach(i => {
      const cnt = rawData.filter(d=>d.item===i.n||d.item.includes(i.n)).length;
      if (cnt > 0) options.push({val:i.c, label:i.n, cnt, active:selItem===i.c});
    });
  } else if (type === 'kind') {
    title = '품종 선택';
    const base = selItem ? allData : rawData;
    const kinds = [...new Set(base.map(d=>d.kind))].sort();
    options = [{val:'', label:'전체', cnt:base.length, active:selKind===''}];
    kinds.forEach(k=>options.push({val:k, label:k, cnt:base.filter(d=>d.kind===k).length, active:selKind===k}));
  }

  document.getElementById('sheet-title').textContent = title;
  document.getElementById('sheet-items').innerHTML = options.map(o=>`
    <div class="sheet-item ${o.active?'active':''}" onclick="selectSheetItem('${o.val.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <span>${o.label}</span>
      ${o.cnt!==null?`<span class="cnt">${o.cnt}건</span>`:''}
    </div>`).join('');
  document.getElementById('sheet-overlay').classList.add('open');
}

function selectSheetItem(val) {
  closeSheet();
  if (curSheet === 'market') {
    selMarket = val; selCorp = '';
    selCat = 'WHS'; selItem = ''; selKind = ''; selGrade = '';
    doSearch();
  } else if (curSheet === 'corp') {
    selCorp = val;
    filterWholesale();
  } else if (curSheet === 'cat') {
    if (selCat === val) return;
    selCat = val; selItem = ''; selKind = ''; selGrade = ''; selCorp = '';
    doSearch();
  } else if (curSheet === 'item') {
    selItem = val; selKind = ''; selGrade = '';
    const name = getItemName(val) || val;
    if (val && NO_KAMIS.includes(name)) { showNoKamis(name); updatePanel(); return; }
    filterAndRender();
  } else if (curSheet === 'kind') {
    selKind = val; selGrade = '';
    filterAndRender();
  }
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
}

function selectDate(val) {
  if (!val) return;
  selDate = val;
  updatePanel();
  doSearch();
}

// ===== 도매시장 조회 =====
async function fetchWholesaleData() {
  if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    throw new Error('도매시장 기능은 로컬 서버(localhost)에서만 동작합니다. server.py를 실행해주세요.');
  }
  if (!mrafaKey) {
    document.getElementById('mafra-banner').style.display = 'block';
    throw new Error('농림부 API 키가 필요합니다.');
  }
  const dateStr = selDate.replace(/-/g,'');
  const url = `/proxy/mafra/openapi/${mrafaKey}/json/Grid_20240625000000000654_1/1/500?SALEDATE=${dateStr}&WHSALCD=${selMarket}`;
  const r = await fetch(url, {signal: AbortSignal.timeout(10000)});
  if (!r.ok) throw new Error('API 오류 (HTTP ' + r.status + ')');
  const json = await r.json();
  if (json.result?.code && json.result.code !== 'INFO-000') throw new Error(json.result.message || 'API 오류');
  const svc = json['Grid_20240625000000000654_1'];
  if (!svc) throw new Error('응답 형식 오류');
  return (svc.row || []).map(r => ({
    item:     r.PRDLST_NM || r.ITEM_NM  || '-',
    kind:     r.SANPUM_NM || r.PRDNM    || '-',
    orig:     r.ORIG_NM   || r.ORIGIN   || '-',
    qty:      parseFloat(r.TOTQTY || '0') || 0,
    corp:     r.CPSL_NM   || r.WHLSALCO_NM || '-',
    priceAvg: parseInt((r.AUCTN_PRC_AVG||'0').toString().replace(/,/g,'')) || 0,
    priceMax: parseInt((r.AUCTN_PRC_MAX||'0').toString().replace(/,/g,'')) || 0,
    priceMin: parseInt((r.AUCTN_PRC_MIN||'0').toString().replace(/,/g,'')) || 0,
  }));
}

function filterWholesale() {
  let data = whlData;
  if (selCorp) data = data.filter(d=>d.corp===selCorp);
  const sorted = [...data].sort((a,b)=>{
    if (selSort==='price-desc') return b.priceAvg - a.priceAvg;
    if (selSort==='price-asc')  return a.priceAvg - b.priceAvg;
    return a.item.localeCompare(b.item,'ko');
  });
  document.getElementById('thead-row').innerHTML = '<th>품목/품종</th><th>원산지</th><th>거래량</th><th>법인</th><th>평균경락가</th>';
  document.getElementById('no-data-area').innerHTML = '';
  if (!sorted.length) {
    document.getElementById('table-body').innerHTML = '<tr class="empty-row"><td colspan="5">📭 경매 데이터가 없습니다<br><small style="color:#999">경매는 주로 새벽~오전에 진행됩니다</small></td></tr>';
  } else {
    document.getElementById('table-body').innerHTML = sorted.map(d=>`<tr>
      <td><div class="td-item">${d.item}</div><div class="td-kind">${d.kind}</div></td>
      <td style="font-size:11px;color:var(--sub)">${d.orig}</td>
      <td style="font-size:11px">${d.qty>0?d.qty.toLocaleString()+'kg':'-'}</td>
      <td style="font-size:11px;color:var(--sub)">${d.corp}</td>
      <td class="td-price">${d.priceAvg>0?d.priceAvg.toLocaleString()+'원':'-'}</td>
    </tr>`).join('');
  }
  document.getElementById('result-info').innerHTML = `<strong>${data.length}건</strong> 조회됨`;
  updatePanel();
}

// ===== KAMIS 조회 =====
function getItemName(code) {
  for (const items of Object.values(ITEMS)) {
    const f = items.find(i=>i.c===code);
    if (f) return f.n;
  }
  return '';
}

async function doSearch() {
  document.getElementById('table-body').innerHTML = '<tr class="empty-row"><td colspan="5"><div class="spinner"></div>조회 중...</td></tr>';
  document.getElementById('no-data-area').innerHTML = '';
  document.getElementById('result-info').textContent = '조회 중...';
  updatePanel();

  if (selCat === 'WHS') {
    try {
      whlData = await fetchWholesaleData();
      selCorp = '';
      filterWholesale();
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 기준';
    } catch(e) {
      document.getElementById('thead-row').innerHTML = '<th>품목/품종</th><th>원산지</th><th>거래량</th><th>법인</th><th>평균경락가</th>';
      document.getElementById('table-body').innerHTML = `<tr class="empty-row"><td colspan="5">⚠️ ${e.message}</td></tr>`;
      document.getElementById('result-info').textContent = '오류 발생';
      updatePanel();
    }
    return;
  }

  // KAMIS 모드
  document.getElementById('thead-row').innerHTML = '<th>날짜</th><th>품목</th><th>등급</th><th>규격</th><th>경락가</th>';
  if (!apiKey) { document.getElementById('api-banner').style.display='block'; document.getElementById('result-info').textContent='API 키 필요'; return; }
  const iname = getItemName(selItem);
  if (selItem && NO_KAMIS.includes(iname)) { showNoKamis(iname); return; }

  try {
    rawData = await fetchData();
    selKind = ''; selGrade = '';
    filterAndRender();
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 기준';
  } catch(e) {
    document.getElementById('table-body').innerHTML = `<tr class="empty-row"><td colspan="5">⚠️ ${e.message}</td></tr>`;
    document.getElementById('result-info').textContent = '오류 발생';
  }
}

async function fetchData() {
  const params = new URLSearchParams({
    action:'dailyPriceByCategoryList',
    p_cert_key:apiKey, p_cert_id:apiId,
    p_returntype:'json', p_product_cls_code:'02',
    p_item_category_code:selCat||'',
    p_regday:selDate, p_convert_kg_yn:'N',
  });
  const url = `${KAMIS_BASE}?${params}`;
  let res;
  for (const proxy of CORS_PROXIES) {
    try { res = await fetch(proxy(url),{signal:AbortSignal.timeout(8000)}); if(res.ok) break; }
    catch(e) { res=null; }
  }
  if (!res?.ok) throw new Error('네트워크 오류. 잠시 후 다시 시도해주세요.');
  const json = await res.json();
  if (!json.data?.item?.length) throw new Error('해당 날짜의 데이터가 없습니다. 평일 날짜로 변경해보세요.');
  return json.data.item
    .filter(r => parseInt((r.dpr1||'0').replace(/,/g,'')) > 0)
    .map(r => ({
      item:  r.item_name||'-', kind:  r.kind_name||'-',
      grade: r.rank||'-',     unit:  r.unit||'-',
      price: parseInt((r.dpr1||'0').replace(/,/g,''))||0,
      week1: parseInt((r.dpr3||'0').replace(/,/g,''))||0,
    }));
}

function filterAndRender() {
  let data = rawData;
  const iname = getItemName(selItem) || selItem;
  if (selItem && iname) {
    const exact = data.filter(d=>d.item===iname);
    data = exact.length > 0 ? exact : data.filter(d=>d.item.includes(iname));
  }
  if (selKind)  data = data.filter(d=>d.kind===selKind);
  if (selGrade) data = data.filter(d=>d.grade===selGrade);
  allData = data;
  renderTable(sortData(allData));
  document.getElementById('result-info').innerHTML = `<strong>${allData.length}건</strong> 조회됨`;
  updatePanel();
}

function sortData(data) {
  return [...data].sort((a,b)=>{
    if (selSort==='price-desc') return b.price-a.price;
    if (selSort==='price-asc')  return a.price-b.price;
    return a.item.localeCompare(b.item,'ko');
  });
}

function renderTable(data) {
  document.getElementById('no-data-area').innerHTML = '';
  if (!data.length) {
    document.getElementById('table-body').innerHTML = '<tr class="empty-row"><td colspan="5">📭 데이터가 없습니다</td></tr>';
    return;
  }
  document.getElementById('table-body').innerHTML = data.map(d => {
    const chg = d.week1>0 ? Math.round((d.price-d.week1)/d.week1*100) : null;
    const arrow = chg!==null ? (chg>0?`<span style="color:var(--red);font-size:10px"> ▲${chg}%</span>`:chg<0?`<span style="color:var(--blue);font-size:10px"> ▼${Math.abs(chg)}%</span>`:'') : '';
    return `<tr>
      <td class="td-date">${selDate}</td>
      <td><div class="td-item">${d.item}</div><div class="td-kind">${d.kind}</div></td>
      <td style="font-size:11px">${d.grade}</td>
      <td style="font-size:11px;color:var(--sub)">${d.unit}</td>
      <td class="td-price">${d.price.toLocaleString()}원${arrow}</td>
    </tr>`;
  }).join('');
}

function showNoKamis(itemName) {
  document.getElementById('table-body').innerHTML = '';
  document.getElementById('no-data-area').innerHTML = `
    <div class="no-data-box">
      <div class="icon">🫐</div>
      <p><strong>${itemName}</strong>은(는) 공영도매시장 경매 대상 품목이 아니어서<br>KAMIS 경락 데이터가 없습니다.</p>
      <a href="https://at.agromarket.kr/users/price/retail/daily.do" target="_blank">🛒 KAMIS 소매가격</a>
      <a href="https://at.agromarket.kr/users/price/wholesale/daily.do" target="_blank">🏪 aT 중도매인 정보</a>
      <a href="https://www.kamis.or.kr" target="_blank">📊 KAMIS 직접검색</a>
    </div>`;
  document.getElementById('result-info').textContent = '경락 데이터 없음';
}
</script>
